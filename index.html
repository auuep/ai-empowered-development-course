<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>My App</h1>
        <div class="header-actions">
            <button class="shortcuts-btn" id="shortcutsBtn" aria-label="Keyboard shortcuts">?</button>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
        </div>
    </header>

    <main>
        <div class="container">
            <h1>My Todos</h1>
            <div class="input-section">
                <input type="text" id="todoInput" placeholder="Add a new todo...">
                <input type="date" id="dueDateInput" title="Due date (optional)">
                <div class="priority-selector" id="prioritySelector" aria-label="Priority">
                    <button type="button" class="priority-btn" data-priority="high">High</button>
                    <button type="button" class="priority-btn active" data-priority="medium">Medium</button>
                    <button type="button" class="priority-btn" data-priority="low">Low</button>
                </div>
                <button id="addBtn">Add</button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
                <button class="sort-btn" id="sortDueDateBtn">Sort by due date</button>
                <button class="sort-btn" id="sortPriorityBtn">Sort by priority</button>
            </div>

            <div class="shortcuts-panel" id="shortcutsPanel" hidden>
                <div class="shortcuts-grid">
                    <kbd>N</kbd><span>Focus new todo input</span>
                    <kbd>1</kbd><span>Show all todos</span>
                    <kbd>2</kbd><span>Show active todos</span>
                    <kbd>3</kbd><span>Show completed todos</span>
                    <kbd>Esc</kbd><span>Clear input &amp; close panels</span>
                </div>
            </div>

            <ul class="todo-list" id="todoList"></ul>
        </div>
    </main>

    <footer>
        <p>&copy; 2026</p>
    </footer>

    <script type="module" src="/main.ts"></script>
</body>
</html>
